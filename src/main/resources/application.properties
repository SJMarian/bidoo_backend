# ============================================================
# application.properties — Notification System additions
# ============================================================
# Add the lines below to your existing src/main/resources/application.properties
# (The full block is shown here for reference; keep your existing DB config)
# ============================================================

# --- Existing DB config (keep yours as-is) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/bidoo_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Server port ---
server.port=8080

# --- Async support (required for @Async in NotificationEventListener) ---
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# --- WebSocket / STOMP ---
# No extra config needed; WebSocketConfig.java handles it.
# SockJS endpoint: ws://localhost:8080/ws

# --- CORS (allow Vue dev server) ---
# Handled via @CrossOrigin in controllers; adjust if you add Spring Security.
