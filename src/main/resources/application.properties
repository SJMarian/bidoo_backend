spring.application.name=bidoo_backend

# PostgreSQL DB connection
spring.datasource.url=jdbc:postgresql://localhost:5432/bidoo_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Load SQL seed data on startup for PostgreSQL
spring.sql.init.mode=always
spring.sql.init.platform=postgresql
spring.sql.init.encoding=UTF-8
spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# SSLCommerz Configuration
sslcommerz.store-id=your_sslcommerz_store_id
sslcommerz.store-passwd=your_sslcommerz_store_password
sslcommerz.is-sandbox=true
sslcommerz.success-url=http://localhost:8080/api/v1/orders/payment/success
sslcommerz.fail-url=http://localhost:8080/api/v1/orders/payment/fail
sslcommerz.cancel-url=http://localhost:8080/api/v1/orders/payment/cancel